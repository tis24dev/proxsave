name: Test & Coverage

on:
  push:
    branches: [ main, dev ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: 'go.mod'

      - name: Resolve coverage toolchain
        run: |
          TOOLCHAIN_FROM_MOD=$(awk '/^toolchain /{print $2}' go.mod)
          if [ -n "$TOOLCHAIN_FROM_MOD" ]; then
            echo "COVER_GOTOOLCHAIN=${TOOLCHAIN_FROM_MOD}+auto" >> "$GITHUB_ENV"
          else
            echo "COVER_GOTOOLCHAIN=auto" >> "$GITHUB_ENV"
          fi

      - name: Run tests with coverage
        env:
          GOTOOLCHAIN: ${{ env.COVER_GOTOOLCHAIN }}
        run: |
          go test $(go list ./... | grep -v -E '/cmd/|/pbs$|/bech32$|^github.com/tis24dev/proxsave$') -coverprofile=coverage.out

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: true
