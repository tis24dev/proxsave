name: Test & Coverage

on:
  push:
    branches: [ main, dev ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # Coverage upload only; no later step uses the git remote, so don't keep
          # the GITHUB_TOKEN in .git/config.
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Resolve coverage toolchain
        run: |
          TOOLCHAIN_FROM_MOD=$(awk '/^toolchain /{print $2}' go.mod)
          if [ -n "$TOOLCHAIN_FROM_MOD" ]; then
            echo "COVER_GOTOOLCHAIN=${TOOLCHAIN_FROM_MOD}+auto" >> "$GITHUB_ENV"
          else
            echo "COVER_GOTOOLCHAIN=auto" >> "$GITHUB_ENV"
          fi

      - name: Run tests with coverage
        env:
          GOTOOLCHAIN: ${{ env.COVER_GOTOOLCHAIN }}
        run: |
          go test $(go list ./... | grep -v -E '/cmd/|/pbs$|/bech32$|^github.com/tis24dev/proxsave$') -coverprofile=coverage.out

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: true
          # Skip the GPG integrity check of the downloaded Codecov CLI wrapper.
          # WHY: the wrapper imports Codecov's PGP public key from a keyserver at
          # runtime, and that import is flaky on GitHub runners: gpg reports
          # "no valid OpenPGP data found" -> "Can't check signature: No public
          # key". With fail_ci_if_error: true (above) that failure aborts the
          # whole upload step, so genuine coverage runs would fail CI on a
          # transient keyserver hiccup rather than on a real problem.
          #
          # Compensating controls keep the residual risk low:
          #  - codecov-action is pinned by full commit SHA (see uses: above), so
          #    the wrapper code that runs is fixed, not a moving tag.
          #  - the CLI itself is still fetched over HTTPS from cli.codecov.io.
          #  - the only payload uploaded is coverage.out, a coverage report with
          #    no source code or secrets in it.
          #  - CODECOV_TOKEN is a scoped repo secret, not a broad credential.
          #
          # To re-enable genuine GPG verification: pin (vendor) the Codecov PGP
          # public key in-repo and import it before this step, then run a CI
          # dry-run on a branch to confirm the wrapper honors a pre-imported key
          # instead of re-fetching from a keyserver.
          #
          # NOTE: the input is spelled with an underscore (skip_validation).
          skip_validation: true
