name: Test & Coverage

on:
  push:
    branches: [ main, dev ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Resolve coverage toolchain
        run: |
          TOOLCHAIN_FROM_MOD=$(awk '/^toolchain /{print $2}' go.mod)
          if [ -n "$TOOLCHAIN_FROM_MOD" ]; then
            echo "COVER_GOTOOLCHAIN=${TOOLCHAIN_FROM_MOD}+auto" >> "$GITHUB_ENV"
          else
            echo "COVER_GOTOOLCHAIN=auto" >> "$GITHUB_ENV"
          fi

      - name: Run tests with coverage
        env:
          GOTOOLCHAIN: ${{ env.COVER_GOTOOLCHAIN }}
        run: |
          go test $(go list ./... | grep -v -E '/cmd/|/pbs$|/bech32$|^github.com/tis24dev/proxsave$') -coverprofile=coverage.out

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: true
