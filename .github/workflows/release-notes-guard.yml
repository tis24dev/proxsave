name: Release Notes Guard

run-name: Release notes guard - PR ${{ github.event.pull_request.number }}

"on":
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release-notes-guard:
    name: release-notes-guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Classify PR
        id: gate
        shell: bash
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Trust gate: ONLY the internal release path (same-repo dev -> main) may run the
          # PR's own Go code. This check uses the GitHub context alone (no PR code) and runs
          # BEFORE the PR's release-policy.sh is sourced, so an untrusted fork can never
          # execute head code here (this is why release-guard.yml checks out the base policy;
          # this workflow needs head to test head, so it gates on same-repo first instead).
          if [[ "${PR_HEAD_REPO}" != "${REPOSITORY}" || "${PR_BASE_REF}" != "main" || "${PR_HEAD_REF}" != "dev" ]]; then
            echo "::notice::Not an internal dev -> main PR; skipping the what's-new guards."
            echo "internal=false" >> "${GITHUB_OUTPUT}"
            echo "enforce=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Same-repo dev -> main: head is trusted, so the registry lint runs on EVERY such
          # PR (release or maintenance) as a second checkpoint at the release boundary.
          echo "internal=true" >> "${GITHUB_OUTPUT}"

          if [[ ! -f .github/scripts/release-policy.sh ]]; then
            echo "::notice::Release policy not present on head; version-specific notes gate skipped."
            echo "enforce=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          source .github/scripts/release-policy.sh

          # Maintenance dev -> main PRs carry no release marker: still lint the registry, but
          # do not enforce the version-specific notes gate.
          if ! TAG="$(extract_pr_marker release-tag)"; then
            echo "::notice::No release marker; maintenance PR (registry still linted, version gate skipped)."
            echo "enforce=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          validate_release_tag "${TAG}"
          echo "enforce=true" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "::notice::Enforcing what's-new notes for release ${TAG}."

      - name: Setup Go
        if: steps.gate.outputs.internal == 'true'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      # Dedicated, named home for the always-on registry lint at the release boundary, so it
      # never depends only on another workflow happening to run `go test` on the package.
      - name: Lint the what's-new registry
        if: steps.gate.outputs.internal == 'true'
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/whatsnew/ -run TestRegistryWellFormed -v

      # Version-specific gate: a FINAL release must carry a well-formed what's-new entry.
      - name: Require what's-new notes for the release
        if: steps.gate.outputs.enforce == 'true'
        shell: bash
        env:
          WHATSNEW_REQUIRE_VERSION: ${{ steps.gate.outputs.tag }}
        run: |
          set -euo pipefail
          go test ./internal/whatsnew/ -run TestReleaseNotesPresent -v
